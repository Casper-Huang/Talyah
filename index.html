<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統維護中 | System Maintenance</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 90%; }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h1 { color: #1a1a1a; margin: 0 0 15px 0; font-size: 24px; }
        p { color: #666; line-height: 1.6; margin-bottom: 25px; }
        .status-tag { display: inline-block; padding: 6px 12px; background: #fff1f0; border: 1px solid #ffa39e; color: #cf1322; border-radius: 4px; font-size: 14px; font-weight: bold; }
        .footer { margin-top: 30px; font-size: 12px; color: #999; border-top: 1px solid #eee; pt: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⚙️</div>
        <h1>系統暫時維護中</h1>
        <p>很抱歉，目前雲端環境連線異常，我們正在聯繫官方技術團隊處理中。請稍後再試。</p>
        <div class="status-tag">Status: 504 Gateway Timeout (AWS CloudFront)</div>
        <div class="footer">
            最後更新時間：2026-05-10<br>
            感謝您的耐心配合
        </div>
    </div>
</body>
</html>
